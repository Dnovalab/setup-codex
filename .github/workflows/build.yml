name: Build and Releaseon:  push:    branches: [main]    tags:      - 'v*'  workflow_dispatch:jobs:  build-mac:    runs-on: macos-latest    steps:      - uses: actions/checkout@v4      - uses: actions/setup-node@v4        with:          node-version: 20      - run: npm install      - run: npm run build:mac      - uses: actions/upload-artifact@v4        with:          name: setup-codex-mac          path: dist/*.dmg  build-win:    runs-on: windows-latest    steps:      - uses: actions/checkout@v4      - uses: actions/setup-node@v4        with:          node-version: 20      - run: npm install      - run: npm run build:win      - uses: actions/upload-artifact@v4        with:          name: setup-codex-win
